# CM-Butterfly API 개발용 Docker Compose
# cm-mayfly 환경에서 cm-butterfly-api만 교체하여 테스트할 때 사용
#
# 사용법:
#   docker compose -f docker-compose.dev.yaml up -d --build    # 빌드 및 실행
#   docker compose -f docker-compose.dev.yaml logs -f          # 로그 확인
#   docker compose -f docker-compose.dev.yaml down              # 중지
#
# 사전 조건:
#   - cm-mayfly가 실행 중이어야 함 (cloud-migrator_default 네트워크 필요)
#   - 기존 cm-butterfly-api 컨테이너가 중지되어 있어야 함

services:
  cm-butterfly-api:
    container_name: cm-butterfly-api
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - cloud-migrator_default
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      POSTGRES_DATABASE_HOST: cm-butterfly-db
      POSTGRES_PORT: 5432
    volumes:
      - ./conf:/app/conf/

networks:
  cloud-migrator_default:
    external: true
