# CM-Butterfly API development Docker Compose
# Used to test by swapping only cm-butterfly-api within a cm-mayfly environment
#
# Usage:
#   docker compose -f docker-compose.dev.yaml up -d --build    # build and run
#   docker compose -f docker-compose.dev.yaml logs -f          # check logs
#   docker compose -f docker-compose.dev.yaml down              # stop
#
# Prerequisites:
#   - cm-mayfly must be running (the cloud-migrator_default network is required)
#   - the existing cm-butterfly-api container must be stopped

services:
  cm-butterfly-api:
    container_name: cm-butterfly-api
    build:
      context: .
      dockerfile: Dockerfile
    networks:
      - cloud-migrator_default
    ports:
      - "4000:4000"
    env_file:
      - .env
    environment:
      POSTGRES_DATABASE_HOST: cm-butterfly-db
      POSTGRES_PORT: 5432
    volumes:
      - ./conf:/app/conf/

networks:
  cloud-migrator_default:
    external: true
