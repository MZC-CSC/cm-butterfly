server {
    listen 80;
    server_name cm-butterfly-front;

    root   /usr/share/nginx/html;
    index  index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    error_page 404 /index.html;
    
    error_log /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;

    location /api/ {
        # if ($http_origin != "http://localhost") {
        #     return 403;
        # }

        proxy_pass http://cm-butterfly-api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 인프라 삭제 같은 장시간 작업은 하류(cm-beetle 45분·cb-tumblebug 최소 10분)에서
        # 오래 걸린다. nginx 기본 60초 proxy_read_timeout 에 걸리면 삭제는 계속 진행되는데
        # 프론트만 504 로 끊겨 "모달이 안 닫힘"으로 보인다. 하류 한도에 맞춰 넉넉히 둔다. (BAR-1444)
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }
}
